# plain TD3 baseline.
type: mlp
actor:
  hidden_dims: [256, 256]
critic:
  hidden_dims: [256, 256]

lr: 3e-4
buffer_size: 1000000
batch_size: 256
tau: 0.005
policy_delay: 2
exploration_noise: 0.1
exploration_noise_final: 0.01
exploration_noise_decay_steps: 300000
target_noise: 0.2
target_noise_final: 0.05
target_noise_decay_steps: 300000
noise_clip: 0.5
noise_clip_final: 0.15
noise_clip_decay_steps: 300000
grad_clip_norm: 10.0
critic_loss: huber
huber_beta: 1.0
target_q_clip: 5000.0
gamma: 0.99
start_steps: 25000
