hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}_${experiment.name}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - model=base,sliding_window,linear
    - pos_encoding=absolute,rope
    - data.context_length=512,1024
    - trainer.max_steps=300
    - trainer.eval_interval=100
  job:
    name: train
    chdir: null
    override_dirname: data.context_length=512,1024,model=base,sliding_window,linear,pos_encoding=absolute,rope,trainer.eval_interval=100,trainer.max_steps=300
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /kaggle/working/SAiDL_Assignment/core_ml
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /kaggle/working/SAiDL_Assignment/core_ml/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      logging: wandb
      trainer: base
      data: wikitext2
      conv: none
      pos_encoding: absolute
      model: base
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
experiment:
  name: baseline
seed: 42
model:
  vocab_size: 50257
  d_model: 384
  n_heads: 6
  n_layers: 6
  dropout: 0.1
  ff_multiplier: 4
  max_seq_len: 4096
  attention:
    type: full
    window_size: 256
    block_size: 64
    num_kv_heads: 2
pos_encoding:
  type: absolute
conv:
  type: none
  kernel_size: 3
data:
  dataset_name: wikitext
  dataset_config: wikitext-2-raw-v1
  context_length: 512
  eval_context_lengths:
  - 512
  - 1024
  - 2048
  train_token_limit: 1200000
  val_token_limit: 300000
trainer:
  batch_size: 8
  learning_rate: 0.0003
  weight_decay: 0.01
  max_steps: 300
  warmup_steps: 100
  eval_interval: 100
  eval_batches: 40
  grad_clip: 1.0
  num_workers: 2
  use_amp: true
logging:
  wandb:
    enable: true
    project: saidl-core-ml
    entity: null
    group: null
    tags: []
