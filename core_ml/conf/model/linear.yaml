# kernel attention path; useful to test, but touchy.
vocab_size: 50257
d_model: 384
n_heads: 6
n_layers: 6
dropout: 0.1
ff_multiplier: 4
max_seq_len: 4096

attention:
  type: linear
  window_size: 256
  block_size: 64
  num_kv_heads: 2
  linear_chunk_size: 64
  linear_feature_eps: 1.0e-6
  linear_output_clip: 64.0
